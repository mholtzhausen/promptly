name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            pkg-config \
            build-essential

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: make build

      - name: Package Linux x86_64 release assets
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/release/promptly dist/promptly-x86_64-linux
          chmod 755 dist/promptly-x86_64-linux
          (
            cd dist
            sha256sum promptly-x86_64-linux > promptly-x86_64-linux.sha256
          )

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/promptly-x86_64-linux
            dist/promptly-x86_64-linux.sha256
            scripts/install.sh
          generate_release_notes: true
